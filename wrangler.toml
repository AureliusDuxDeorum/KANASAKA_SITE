name = "kanasaka-site"
compatibility_date = "2024-11-12"
pages_build_output_dir = "."

# D1: wrangler d1 execute kanasaka-auth --remote --file=./migrations/003_profile.sql
# Email secret (Pages → Settings → Variables and secrets):
#   RESEND_API_KEY = your Resend API key
# Bind D1 in Pages → Settings → Bindings (variable name: DB)

[[d1_databases]]
binding = "DB"
database_name = "kanasaka-auth"
database_id = "b76e77d3-4056-4ba2-8356-c69fb65a13d9"

[vars]
SESSION_DAYS = "30"
SITE_URL = "https://kanasaka.com"
FROM_EMAIL = "noreply@kanasaka.com"
FROM_NAME = "KANASAKA"

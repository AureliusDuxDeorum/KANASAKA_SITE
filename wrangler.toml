name = "kanasaka-site"
compatibility_date = "2024-11-12"
pages_build_output_dir = "."

# D1 migrations (run in order on remote):
#   npx wrangler d1 execute kanasaka-auth --remote --file=./migrations/003_profile.sql
#   npx wrangler d1 execute kanasaka-auth --remote --file=./migrations/004_security.sql
#   npx wrangler d1 execute kanasaka-auth --remote --file=./migrations/005_auth_hardening.sql
#   npx wrangler d1 execute kanasaka-auth --remote --file=./migrations/006_repair_token_schema.sql
#   npx wrangler d1 execute kanasaka-auth --remote --file=./migrations/007_wipe_accounts.sql
# Email secret (Pages → Settings → Variables and secrets):
#   RESEND_API_KEY = your Resend API key
# Required session pepper (Pages → Production secrets):
#   SESSION_SECRET = long random string (32+ bytes)
# Optional admin secret for /api/auth/email-status:
#   ADMIN_SECRET = long random string (send as Authorization: Bearer …)
# Optional Argon2 tuning (Pages → Variables):
#   ARGON2_MEMORY_KIB = 8192
#   ARGON2_ITERATIONS = 2
#   SESSION_ROTATE_HOURS = 24
# WAF setup: see docs/CLOUDFLARE_WAF.md
# Bind D1 in Pages → Settings → Bindings (variable name: DB)

[[d1_databases]]
binding = "DB"
database_name = "kanasaka-auth"
database_id = "b76e77d3-4056-4ba2-8356-c69fb65a13d9"

[vars]
SESSION_DAYS = "30"
SITE_URL = "https://kanasaka.com"
FROM_EMAIL = "noreply@kanasaka.com"
FROM_NAME = "KANASAKA"
